<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WAS-DL</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#00e5ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WAS-DL">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PVWBEY2Q4Q"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-PVWBEY2Q4Q');

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;color:#e8e8f0;font-family:monospace;padding:20px;max-width:600px;margin:0 auto;}
h1{background:linear-gradient(135deg,#00e5ff,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:2rem;margin-bottom:6px;}
.subtitle{color:#6b6b8a;font-size:0.8rem;margin-bottom:24px;}
select,input{width:100%;background:#111118;border:1px solid #2a2a3a;border-radius:8px;padding:12px;color:#e8e8f0;font-size:1rem;margin:8px 0;outline:none;}
button.main-btn{width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#00e5ff);border:none;border-radius:8px;color:white;font-size:1rem;font-weight:bold;cursor:pointer;margin:8px 0;}
.card{background:#16161f;border:1px solid #2a2a3a;border-radius:12px;padding:20px;margin:16px 0;}
.label{font-size:0.7rem;letter-spacing:2px;color:#6b6b8a;text-transform:uppercase;display:block;margin-bottom:4px;}
.progress-wrap{background:#111118;border-radius:100px;height:10px;margin:10px 0;}
.progress-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,#7c3aed,#00e5ff);width:0%;transition:width 0.4s;}
.success{color:#10b981;}
.error-box{color:#ef4444;}
.muted{color:#6b6b8a;font-size:0.8rem;}
#preview,#progress-section,#result-section,#error-section{display:none;}

/* URL Input Row */
.url-row{display:flex;gap:8px;margin:8px 0;}
.url-row input{flex:1;margin:0;}
.toggle-btn{flex-shrink:0;width:80px;padding:0 10px;height:48px;border:none;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer;transition:all 0.2s;color:white;white-space:nowrap;}
.toggle-btn.paste{background:linear-gradient(135deg,#00c853,#00e676);}
.toggle-btn.clear{background:linear-gradient(135deg,#ef4444,#f87171);}
</style>
</head>
<body>
<div style="text-align:center;margin-bottom:10px;">
<img src="/static/icon.png?v=2" style="width:70px;height:70px;border-radius:18px;"/>
</div>
<h1 style="text-align:center;">WAS-DL</h1>
<p class="subtitle" style="text-align:center;">YouTube · TikTok · Instagram · Facebook · 1000+ Sites</p>

<div class="card">
  <span class="label">VIDEO URL</span>
  <div class="url-row">
    <input type="text" id="url" placeholder="Paste video link here..." oninput="onUrlInput()"/>
    <button class="toggle-btn paste" id="toggle-btn" onclick="toggleAction()">PASTE</button>
  </div>

  <div id="preview" style="margin:12px 0;">
    <img id="thumb" src="" style="width:100%;border-radius:8px;margin-bottom:8px;"/>
    <div id="vid-title" style="font-weight:bold;margin-bottom:6px;"></div>
    <div class="muted"><span id="vid-platform"></span> · <span id="vid-duration"></span></div>
  </div>

  <button class="main-btn" onclick="fetchInfo()">🔍 Inspect Video</button>

  <span class="label" style="margin-top:8px;">Quality</span>
  <select id="quality">
    <option value="best">Best Available</option>
    <option value="1080">1080p HD</option>
    <option value="720">720p</option>
    <option value="480">480p</option>
  </select>

  <span class="label">Format</span>
  <select id="format">
    <option value="video">Video (MP4)</option>
    <option value="audio">Audio Only (MP3)</option>
  </select>

  <button class="main-btn" onclick="startDownload()">⬇ Download</button>
</div>

<div id="error-section" class="card error-box">
  ⚠ <span id="error-msg"></span>
</div>

<div id="progress-section" class="card">
  <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
    <span id="prog-label">Downloading...</span>
    <span id="prog-pct" class="success">0%</span>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="prog-bar"></div></div>
  <div class="muted">Speed: <span id="prog-speed">—</span> · ETA: <span id="prog-eta">—</span></div>
</div>

<div id="result-section" class="card" style="text-align:center;">
  <div style="font-size:48px;margin-bottom:10px;">🎬</div>
  <div class="success" style="font-size:1.1rem;font-weight:bold;margin-bottom:6px;">Video Gallery mein Save Ho Gayi!</div>
  <div class="muted" id="result-name"></div>
  <div style="animation:pulse 1.5s infinite;">
<a id="result-link" href="#" download style="display:block;padding:16px;background:linear-gradient(135deg,#10b981,#00e676);border-radius:10px;color:white;font-weight:bold;font-size:1rem;text-decoration:none;text-align:center;box-shadow:0 0 20px rgba(16,185,129,0.5);">⬇ Tap Here to Save Video</a>
</div>
<p style="color:#6b6b8a;font-size:0.75rem;margin-top:10px;text-align:center;">👆 Tap the button above to save video to your device</p>
<style>@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}</style>
</div>

<footer style="text-align:center;padding:24px 0 16px;">
  <p style="font-family:-apple-system,sans-serif;font-size:12px;font-weight:500;color:#4a4a7a;letter-spacing:1px;">
    Developed by Mr. Wajid Shah
  </p>
</footer>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/static/sw.js');
}

let jobId = null;
let poll = null;

function onUrlInput(){
  const val = document.getElementById('url').value.trim();
  const btn = document.getElementById('toggle-btn');
  if(val.length > 0){
    btn.textContent = 'CLEAR';
    btn.className = 'toggle-btn clear';
  } else {
    btn.textContent = 'PASTE';
    btn.className = 'toggle-btn paste';
  }
}

async function toggleAction(){
  const val = document.getElementById('url').value.trim();
  if(val.length > 0){
    document.getElementById('url').value = '';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('error-section').style.display = 'none';
    document.getElementById('progress-section').style.display = 'none';
    onUrlInput();
  } else {
    try{
      const text = await navigator.clipboard.readText();
      document.getElementById('url').value = text;
      onUrlInput();
    } catch(e){
      document.getElementById('url').focus();
    }
  }
}

function fmt(s){
  if(!s) return '?';
  const m = Math.floor(s/60), sec = s%60;
  return m+':'+(sec<10?'0':'')+sec;
}

function showErr(m){
  document.getElementById('error-section').style.display='block';
  document.getElementById('error-msg').textContent=m;
}

function hideErr(){
  document.getElementById('error-section').style.display='none';
}

async function fetchInfo(){
  const url = document.getElementById('url').value.trim();
  if(!url){showErr('Please paste a video link first!');return;}
  hideErr();
  try{
    const r = await fetch('/api/info',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    const d = await r.json();
    if(d.error){showErr(d.error);return;}
    document.getElementById('thumb').src = d.thumbnail||'';
    document.getElementById('vid-title').textContent = d.title||'';
    document.getElementById('vid-platform').textContent = d.platform||'';
    document.getElementById('vid-duration').textContent = fmt(d.duration);
    document.getElementById('preview').style.display = 'block';
  } catch(e){showErr('Server error! Please try again.');}
}

async function startDownload(){
  const url = document.getElementById('url').value.trim();
  if(!url){showErr('Please paste a video link first!');return;}
  hideErr();
  document.getElementById('result-section').style.display='none';
  document.getElementById('progress-section').style.display='block';
  document.getElementById('prog-bar').style.width='0%';
  document.getElementById('prog-pct').textContent='0%';
  document.getElementById('prog-label').textContent='Starting...';
  try{
    const r = await fetch('/api/download',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,quality:document.getElementById('quality').value,format:document.getElementById('format').value})});
    const d = await r.json();
    if(d.error){showErr(d.error);document.getElementById('progress-section').style.display='none';return;}
    jobId = d.job_id;
    pollProgress();
  } catch(e){showErr('Server error! Please try again.');}
}

function pollProgress(){
  if(poll) clearInterval(poll);
  poll = setInterval(async()=>{
    if(!jobId) return;
    const r = await fetch('/api/progress/'+jobId);
    const d = await r.json();
    if(d.status==='downloading'){
      document.getElementById('prog-label').textContent='Downloading...';
      document.getElementById('prog-pct').textContent=d.percent+'%';
      document.getElementById('prog-bar').style.width=d.percent+'%';
      document.getElementById('prog-speed').textContent=d.speed||'—';
      document.getElementById('prog-eta').textContent=d.eta||'—';
    } else if(d.status==='processing'){
      document.getElementById('prog-label').textContent='Processing...';
      document.getElementById('prog-pct').textContent='99%';
      document.getElementById('prog-bar').style.width='99%';
    } else if(d.status==='done'){
      clearInterval(poll);
      document.getElementById('progress-section').style.display='none';
      document.getElementById('result-section').style.display='block';
      document.getElementById('result-name').textContent=d.filename||'';
    } else if(d.status==='error'){
      clearInterval(poll);
      document.getElementById('progress-section').style.display='none';
      showErr(d.error||'Unknown error');
    }
  },1000);
}
</script>
</body></html>
