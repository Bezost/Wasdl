<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00cfff"/>
      <stop offset="100%" style="stop-color:#0047ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>
  <!-- Glow background blob -->
  <ellipse cx="96" cy="90" rx="70" ry="65" fill="#0033aa" opacity="0.15" filter="url(#softglow)"/>
  <!-- W letter -->
  <polyline points="28,48 42,115 58,75 74,115 88,48" fill="none" stroke="url(#blue)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- A letter -->
  <polyline points="80,115 96,48 112,115" fill="none" stroke="url(#blue)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <line x1="85" y1="88" x2="107" y2="88" stroke="url(#blue)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <!-- S letter -->
  <path d="M164,62 Q164,48 148,48 Q132,48 132,65 Q132,80 148,82 Q164,84 164,100 Q164,118 148,118 Q132,118 132,104" fill="none" stroke="url(#blue)" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Download arrow below -->
  <line x1="96" y1="128" x2="96" y2="158" stroke="#00cfff" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <polyline points="78,144 96,163 114,144" fill="none" stroke="#00cfff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Underline -->
  <line x1="60" y1="172" x2="132" y2="172" stroke="#0047ff" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
</svg>